<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" role="img" aria-label="gavel">
  <title>gavel</title>

  <!-- Simplified sound block: 2 stacked bars for tier suggestion -->
  <rect x="2" y="13.5" width="12" height="1.5" rx="0.5" fill="#0ea5e9"/>
  <rect x="3" y="11.8" width="10" height="1.3" rx="0.5" fill="#0ea5e9"/>

  <!-- Simplified gavel: single barrel head + handle + pommel, slight tilt -->
  <g transform="rotate(-10 8 8)">
    <!-- Head: one solid barrel (no segments) -->
    <rect x="1" y="6" width="8" height="4.2" rx="1" fill="#3578e5"/>
    <!-- Handle stub -->
    <rect x="9" y="7.4" width="5.5" height="1.4" rx="0.6" fill="#3578e5"/>
    <!-- Pommel -->
    <circle cx="14.6" cy="8.1" r="0.9" fill="#3578e5"/>
  </g>
</svg>
