name: Gavel
description: Run gavel test/lint, upload JSON artifact, and post a sticky PR comment with a summary and artifact link.
author: Flanksource
branding:
  icon: check-circle
  color: blue

inputs:
  args:
    description: Arguments passed to gavel (e.g. "test --lint" or "lint").
    required: false
    default: "test --lint"
  working-directory:
    description: Working directory in which gavel is executed.
    required: false
    default: "."
  version:
    description: |
      Gavel release to install. Use a semver tag (e.g. "v1.2.3"), "latest"
      to resolve the most recent release, or "source" to skip the release
      download path and rely on a gavel binary the caller has already put on PATH.
    required: false
    default: "latest"
  json-file:
    description: Path (relative to working-directory) for the JSON artifact.
    required: false
    default: "gavel-results.json"
  artifact-name:
    description: Name of the uploaded artifact bundle.
    required: false
    default: "gavel-results"
  comment:
    description: Post / update a sticky PR comment with a summary and artifact link.
    required: false
    default: "true"
  comment-header:
    description: |
      Unique marker that identifies the sticky comment across runs.
      Each distinct header keeps its own sticky comment on a PR.
    required: false
    default: "gavel"
  github-token:
    description: Token used to post the PR comment. Defaults to the workflow's GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}
  fail-on-error:
    description: Fail the action when gavel exits non-zero. Artifacts and the PR comment are still posted either way.
    required: false
    default: "true"

outputs:
  exit-code:
    description: Exit code from the gavel invocation.
    value: ${{ steps.run.outputs.exit_code }}
  json-path:
    description: Absolute path to the JSON artifact.
    value: ${{ steps.run.outputs.json_path }}
  log-path:
    description: Absolute path to the captured gavel stderr log (gavel.log). Always present, even when gavel crashes before writing JSON.
    value: ${{ steps.run.outputs.log_path }}

runs:
  using: composite
  steps:
    - name: Install gavel
      shell: bash
      env:
        GAVEL_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        if [ "$GAVEL_VERSION" = "source" ]; then
          if ! command -v gavel >/dev/null 2>&1; then
            echo "version=source but no gavel binary on PATH" >&2
            exit 1
          fi
          echo "Using pre-installed gavel: $(gavel version 2>/dev/null || echo unknown)"
          exit 0
        fi
        if command -v gavel >/dev/null 2>&1; then
          echo "gavel already on PATH: $(gavel version 2>/dev/null || echo unknown)"
          exit 0
        fi
        case "$RUNNER_OS" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *) echo "unsupported runner OS: $RUNNER_OS" >&2; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "unsupported runner arch: $RUNNER_ARCH" >&2; exit 1 ;;
        esac
        tag="$GAVEL_VERSION"
        if [ "$tag" = "latest" ]; then
          tag="$(gh api repos/flanksource/gavel/releases/latest --jq .tag_name)"
        fi
        asset="gavel_${os}_${arch}"
        url="https://github.com/flanksource/gavel/releases/download/${tag}/${asset}"
        echo "Downloading $url"
        install_dir="$HOME/.local/bin"
        mkdir -p "$install_dir"
        curl -fsSL "$url" -o "$install_dir/gavel"
        chmod +x "$install_dir/gavel"
        echo "$install_dir" >> "$GITHUB_PATH"
        "$install_dir/gavel" version || true

    - name: Run gavel
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GAVEL_ARGS: ${{ inputs.args }}
        JSON_FILE: ${{ inputs.json-file }}
        GAVEL_LOG_FILE: gavel.log
      run: |
        set +e
        rm -f "${JSON_FILE}" "${GAVEL_LOG_FILE}"

        # shellcheck disable=SC2086
        gavel $GAVEL_ARGS \
          --no-progress --no-color --show-passed \
          --format "json=${JSON_FILE}" \
          2> >(tee "${GAVEL_LOG_FILE}" >&2)
        code=$?
        set -e

        if [ ! -f "${JSON_FILE}" ]; then
          log_tail="$(tail -n 200 "${GAVEL_LOG_FILE}" 2>/dev/null | sed 's/"/\\"/g' | tr '\n' ' ')"
          printf '{"error":"gavel exited %s before writing results","exit_code":%s,"log_tail":"%s"}\n' \
            "$code" "$code" "$log_tail" > "${JSON_FILE}"
          echo "gavel did not write ${JSON_FILE}; wrote placeholder stub with exit code $code" >&2
        fi

        {
          echo "exit_code=$code"
          echo "json_path=$(pwd)/${JSON_FILE}"
          echo "log_path=$(pwd)/${GAVEL_LOG_FILE}"
        } >> "$GITHUB_OUTPUT"
        echo "gavel exited with $code"

    - name: Upload artifacts
      id: upload
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.working-directory }}/${{ inputs.json-file }}
          ${{ inputs.working-directory }}/gavel.log
        if-no-files-found: warn

    - name: Write job summary
      if: always()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        JSON_FILE: ${{ inputs.json-file }}
        ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload.outputs.artifact-id }}
      run: |
        summary="$(gavel summary --input "${JSON_FILE}" 2>/dev/null || true)"
        {
          echo "## Gavel results"
          echo ""
          if [ -n "$summary" ]; then
            echo "$summary"
          else
            echo "Gavel exited with code ${{ steps.run.outputs.exit_code }}."
          fi
          echo ""
          echo "[View full results](${ARTIFACT_URL})"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Post / update sticky PR comment
      if: >-
        always() &&
        inputs.comment == 'true' &&
        github.event_name == 'pull_request'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEADER: ${{ inputs.comment-header }}
        JSON_FILE: ${{ inputs.json-file }}
        ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload.outputs.artifact-id }}
      run: |
        set -euo pipefail
        marker="<!-- sticky-comment:${HEADER} -->"
        summary="$(gavel summary --input "${JSON_FILE}" 2>/dev/null || true)"
        body_file="$(mktemp)"
        {
          printf '%s\n\n' "$marker"
          if [ -n "$summary" ]; then
            echo "$summary"
          else
            echo "## Gavel results"
            echo ""
            echo "Gavel exited with code ${{ steps.run.outputs.exit_code }}."
          fi
          echo ""
          echo "[View full results](${ARTIFACT_URL})"
        } > "$body_file"
        existing_id="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
          --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" | head -n1)"
        if [ -n "$existing_id" ]; then
          gh api --method PATCH "repos/${REPO}/issues/comments/${existing_id}" \
            -F body=@"$body_file" >/dev/null
          echo "Updated sticky comment $existing_id"
        else
          gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -F body=@"$body_file" >/dev/null
          echo "Created sticky comment"
        fi

    - name: Propagate gavel exit code
      if: always() && inputs.fail-on-error == 'true' && steps.run.outputs.exit_code != '0'
      shell: bash
      run: |
        echo "gavel exited with ${{ steps.run.outputs.exit_code }}" >&2
        exit ${{ steps.run.outputs.exit_code }}
