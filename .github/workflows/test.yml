name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build test UI
        run: cd testrunner/ui && npm ci && npm run build

      - name: Install dependencies
        run: |
          go mod download
          go mod tidy

      - name: Verify dependencies
        run: go mod verify

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run tests
        run: make test
        env:
          CGO_ENABLED: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build binary
        run: make build

      - name: Test binary
        run: |
          ./gavel --help
          ./gavel version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gavel-linux-amd64
          path: gavel
