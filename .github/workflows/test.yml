name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build gavel
        run: make build

      - name: Install JS test deps
        run: |
          npm install --prefix testrunner/ui
          npm ci --prefix site

      - name: Run tests
        run: ./gavel test
        env:
          CGO_ENABLED: 0

  gavel-npm:
    name: "@flanksource/gavel library"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testrunner/ui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: testrunner/ui/package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build:lib

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build binary
        run: make build

      - name: Test binary
        run: |
          ./gavel --help
          ./gavel version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gavel-linux-amd64
          path: gavel
