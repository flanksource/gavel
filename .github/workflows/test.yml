name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js and TypeScript
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build gavel
        run: make build

      # Node + TypeScript for the jest/vitest/playwright test frameworks and
      # the tsc lint check live in these UI projects' devDependencies.
      - name: Install JS deps
        run: |
          npm install --prefix testrunner/ui
          npm install --prefix pr/ui
          npm ci --prefix site

      # Compile every test binary up front so the per-package timeout in
      # `gavel test` covers execution only. The heaviest packages (ai, ai/aifix
      # pull in ~2k transitive deps) otherwise compile from a cold cache while
      # 16 packages run concurrently on a 2-core runner, blowing the 5m
      # per-package deadline before a single test executes.
      - name: Warm test build cache
        run: go test -count=0 ./...
        env:
          CGO_ENABLED: 0

      - name: Run tests
        run: ./gavel test
        env:
          CGO_ENABLED: 0

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js and TypeScript
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build gavel
        run: make build

      # Node + TypeScript for the tsc / eslint linters live in these UI
      # projects' devDependencies; install them so gavel lint can run them.
      - name: Install JS deps
        run: |
          npm install --prefix testrunner/ui
          npm install --prefix pr/ui
          npm ci --prefix site

      - name: Run linters
        run: ./gavel lint
        env:
          CGO_ENABLED: 0

  gavel-npm:
    name: "@flanksource/gavel library"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testrunner/ui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: testrunner/ui/package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build:lib

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build binary
        run: make build

      - name: Test binary
        run: |
          ./gavel --help
          ./gavel version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gavel-linux-amd64
          path: gavel
