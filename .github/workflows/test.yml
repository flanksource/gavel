name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js and TypeScript
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build gavel
        run: make build

      # Node + TypeScript for the jest/vitest/playwright test frameworks and
      # the tsc lint check live in these UI projects' devDependencies.
      - name: Install JS deps
        run: |
          pnpm -C testrunner/ui install --no-frozen-lockfile
          pnpm -C pr/ui install --no-frozen-lockfile
          npm ci --prefix site

      # `gavel test` compiles all Go test binaries in a pre-build phase before
      # the timed per-package run, so a cold build cache no longer eats into the
      # per-package deadline. Disable with --pre-build=false.
      - name: Run tests
        run: ./gavel test
        env:
          CGO_ENABLED: 0

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js and TypeScript
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build gavel
        run: make build

      # Node + TypeScript for the tsc / eslint linters live in these UI
      # projects' devDependencies; install them so gavel lint can run them.
      - name: Install JS deps
        run: |
          pnpm -C testrunner/ui install --no-frozen-lockfile
          pnpm -C pr/ui install --no-frozen-lockfile
          npm ci --prefix site

      - name: Run linters
        run: ./gavel lint
        env:
          CGO_ENABLED: 0

  gavel-npm:
    name: "@flanksource/gavel library"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testrunner/ui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run check
      - run: pnpm test
      - run: pnpm run build:lib

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build binary
        run: make build

      - name: Test binary
        run: |
          ./gavel --help
          ./gavel version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gavel-linux-amd64
          path: gavel
