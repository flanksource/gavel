name: Publish npm library

# Publish @flanksource/gavel to npm whenever the React library source under
# testrunner/ui/ changes on main. The job's own version-bump commit touches
# testrunner/ui/package.json, but pushes made with GITHUB_TOKEN do not trigger
# new workflow runs, so the path filter is loop-safe without a commit-message
# guard.
on:
  push:
    branches: [main, master]
    paths:
      - "testrunner/ui/**"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  publish-gavel-npm:
    name: Publish @flanksource/gavel to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testrunner/ui
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Enable corepack (pnpm)
        run: corepack enable

      # OIDC trusted publishing (same mechanism as @flanksource/clicky-ui)
      # needs npm >= 11.5.1; the Node 22 bundled npm is too old.
      - run: npm install -g npm@latest

      # Install + build the library with pnpm. clicky-ui resolves from the npm
      # registry here (no sibling checkout). Publishing still uses the npm CLI
      # below for the proven OIDC/provenance path; the package keeps a published
      # clicky-ui range, so there is no workspace: protocol to rewrite.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run check
      - run: pnpm test
      - run: pnpm run build:lib

      - name: Patch-bump version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Authenticate via the GitHub Actions OIDC identity (id-token: write)
      # configured as a trusted publisher for @flanksource/gavel on npmjs.com —
      # no NPM_TOKEN secret required.
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Commit and tag the version bump
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only the version bump in package.json is committed; pnpm-lock.yaml is
          # not (CI resolves clicky-ui from the registry, devs link it locally).
          git add package.json
          git commit -m "chore(release): @flanksource/gavel@${VERSION}"
          git tag "gavel-npm-v${VERSION}"
          git push origin "HEAD:${{ github.ref_name }}" --follow-tags
