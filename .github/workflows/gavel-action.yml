name: Gavel Action (self-test)

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  self-test:
    name: gavel test -lint via composite action
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Install golangci-lint
        shell: bash
        run: |
          set -euo pipefail
          version=v2.11.4
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL "https://github.com/golangci/golangci-lint/releases/download/${version}/golangci-lint-${version#v}-linux-amd64.tar.gz" -o "$tmp/golangci-lint.tar.gz"
          tar -xzf "$tmp/golangci-lint.tar.gz" -C "$tmp"
          mkdir -p "$HOME/.local/bin"
          install -m 0755 "$tmp/golangci-lint-${version#v}-linux-amd64/golangci-lint" "$HOME/.local/bin/golangci-lint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/golangci-lint" version

      - name: Build gavel from source
        run: |
          task build
          install_dir="$HOME/.local/bin"
          mkdir -p "$install_dir"
          cp gavel "$install_dir/gavel"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Run gavel action
        uses: ./
        with:
          args: test --lint
          version: source
          comment-header: gavel-self-test
          fail-on-error: "true"
