name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/gavel

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            testrunner/ui/package-lock.json
            pr/ui/package-lock.json

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      # Build and force-commit the embedded UI bundles (testui.js / prui.js)
      # so the release tag carries them. They are gitignored, so without this
      # step a downstream `go get` by tag/SHA fails with
      # `//go:embed dist/*.js`: "no matching files found".
      - name: Build and commit embedded UI bundles
        run: |
          task test-ui
          task pr-ui
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f testrunner/ui/dist/testui.js pr/ui/dist/prui.js
          if ! git diff --cached --quiet; then
            git commit -m "chore(embed): rebuild UI bundles for release"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "UI bundles unchanged"
          fi

      - uses: flanksource/deps@v1.0.23
        with:
          tools: |
            svu
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: tag
        run: |
          next=$(svu patch)
          current=$(svu current)
          if [ "$next" = "$current" ]; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "No new version to tag (current: $current)"
            exit 0
          fi
          git tag "$next"
          git push origin "$next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

  publish-gavel-npm:
    name: Publish @flanksource/gavel to npm
    runs-on: ubuntu-latest
    # Auto patch-bump and publish the React library on every push to main, but
    # skip the runs triggered by our own bump commit so it does not loop.
    if: "${{ !contains(github.event.head_commit.message, 'chore(release): @flanksource/gavel') }}"
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: testrunner/ui
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: testrunner/ui/package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build:lib

      - name: Patch-bump version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and tag the version bump
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): @flanksource/gavel@${VERSION}"
          git tag "gavel-npm-v${VERSION}"
          git push origin "HEAD:${{ github.ref_name }}" --follow-tags

  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64, runner: ubuntu-latest    }
          - { goos: linux,  goarch: arm64, runner: ubuntu-24.04-arm }
          - { goos: darwin, goarch: amd64, runner: ubuntu-24.04-arm }
          - { goos: darwin, goarch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            testrunner/ui/package-lock.json
            pr/ui/package-lock.json

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build binary
        run: task build:cross GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Archive binary
        id: archive
        run: |
          mkdir -p dist
          archive_name="gavel_${{ matrix.goos }}_${{ matrix.goarch }}"
          cp ".bin/${archive_name}" dist/gavel
          tar -czf "dist/${archive_name}.tar.gz" -C dist gavel
          echo "path=dist/${archive_name}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          retention-days: 1

  build-docker:
    name: Build image ${{ matrix.platform }}
    needs: [tag, build-binaries]
    if: needs.tag.outputs.created == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64, runner: ubuntu-latest,    goarch: amd64, pair: linux-amd64 }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm, goarch: arm64, pair: linux-arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-${{ matrix.goarch }}
          path: .

      - name: Extract binary
        run: |
          tar -xzf "gavel_linux_${{ matrix.goarch }}.tar.gz"
          chmod +x gavel
          ls -l gavel

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker:
    name: Merge multi-arch manifest
    needs: [tag, build-docker]
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.tag }}
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.tag.outputs.tag }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046 # word-splitting is required to pass -t tags and digest refs as separate args
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ env.REGISTRY_IMAGE }}:${{ needs.tag.outputs.tag }}"

  release:
    name: Create GitHub release
    needs: [tag, build-binaries]
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum gavel_*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Gavel $TAG" \
            --generate-notes \
            dist/gavel_*.tar.gz dist/checksums.txt
