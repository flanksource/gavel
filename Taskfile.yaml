version: "3"

vars:
  BINARY_NAME: gavel
  MAIN_PACKAGE: ./cmd/gavel

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  test-ui:
    desc: Build the test UI frontend bundle (Preact + Vite)
    dir: testrunner/ui
    cmds:
      - npm ci
      - npm run build
    sources:
      - testrunner/ui/src/**/*
      - testrunner/ui/package.json
      - testrunner/ui/vite.config.ts
    generates:
      - testrunner/ui/dist/testui.js

  pr-ui:
    desc: Build the PR review UI frontend bundle (Preact + Vite)
    dir: pr/ui
    cmds:
      - npm ci
      - npm run build
    sources:
      - pr/ui/src/**/*
      - pr/ui/package.json
      - pr/ui/vite.config.ts
    generates:
      - pr/ui/dist/prui.js

  build:
    desc: Build the binary
    deps:
      - test-ui
      - pr-ui
    vars:
      VERSION:
        sh: git describe --tags --always 2>/dev/null || echo "dev"
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      DATE:
        sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
      LDFLAGS: -s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY_NAME}} {{.MAIN_PACKAGE}}
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - ./{{.BINARY_NAME}}

  build:linux-amd64:
    desc: Build the linux-amd64 binary
    deps:
      - test-ui
      - pr-ui
    vars:
      VERSION:
        sh: git describe --tags --always 2>/dev/null || echo "dev"
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      DATE:
        sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
      LDFLAGS: -s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}
      OUTPUT: .bin/{{.BINARY_NAME}}-linux-amd64
    env:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: 0
    cmds:
      - mkdir -p .bin
      - go build -ldflags "{{.LDFLAGS}}" -o {{.OUTPUT}} {{.MAIN_PACKAGE}}
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - ./{{.OUTPUT}}

  install:
    desc: Install the binary to $GOPATH/bin
    deps:
      - build
    cmds:
      - mv "./{{.BINARY_NAME}}" "$GOPATH/bin/"

  deploy:
    desc: |
      Cross-compile gavel for linux-amd64 and install it on a remote host.
      Pass the target as a positional arg: `task deploy -- user@host`.
      Reinstalls the systemd unit via `gavel ssh install --force`, which
      reloads and restarts the service.
    deps:
      - build:linux-amd64
    vars:
      BINARY_LOCAL: .bin/{{.BINARY_NAME}}-linux-amd64
      TARGET: "{{.CLI_ARGS}}"
    preconditions:
      - sh: test -n "{{.TARGET}}"
        msg: "usage: task deploy -- user@host"
    cmds:
      - scp {{.BINARY_LOCAL}} {{.TARGET}}:gavel
      - ssh -t {{.TARGET}} 'sudo install -m 0755 -o root -g root ~/gavel /usr/local/bin/gavel && sudo /usr/local/bin/gavel ssh install --force && rm -f ~/gavel'

  test:
    desc: Run tests
    deps:
      - build
    cmds:
      - go test -v -race -coverprofile=coverage.out $(go list ./... | grep -v '/hack/' | grep -v '/vendor/')
    env:
      CGO_ENABLED: 1

  test:unit:
    desc: Run unit tests only
    cmds:
      - go test -v -short $(go list ./... | grep -v '/hack/' | grep -v '/vendor/')

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -v -race -coverprofile=coverage.out $(go list ./... | grep -v '/hack/' | grep -v '/vendor/')
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  lint:
    desc: Run linters
    cmds:
      - cmd: golangci-lint run
        ignore_error: true
      - go vet ./...
      - go mod tidy

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...
      - gofmt -s -w .

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html
      - rm -rf dist/
      - go clean -cache

  mod:
    desc: Download and tidy modules
    cmds:
      - go mod download
      - go mod tidy

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.BINARY_NAME}}:latest .

  docker:run:
    desc: Run Docker container
    deps: [docker:build]
    cmds:
      - docker run --rm {{.BINARY_NAME}}:latest --help

  ci:
    desc: Run CI pipeline locally
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - task: build
