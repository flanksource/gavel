filter_sets:
  bots:
    ignore_authors:
      - "dependabot*"
      - "renovate*"
      - "github-actions*"
      - "*[bot]*"

  noise:
    ignore_files:
      - "*.lock"
      - "go.sum"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - "Pipfile.lock"
      - "Gemfile.lock"
      - "Cargo.lock"
      - "composer.lock"

  merges:
    ignore_commit_rules:
      - cel: "commit.is_merge"

includes:
  - bots
  - noise
  - merges
